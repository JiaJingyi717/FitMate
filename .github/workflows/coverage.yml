name: Test and Coverage

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flask flask-cors flask-jwt-extended flask-sqlalchemy requests python-dotenv pymysql
          pip install pytest pytest-cov

      - name: Run backend tests with coverage
        run: pytest

      - name: Upload backend coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml
          flags: backend
          disable_search: true
          fail_ci_if_error: false

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/fitmate-frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/fitmate-frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests with coverage
        run: npm run test:coverage

      - name: Check frontend coverage files
        run: |
          pwd
          ls -la coverage
          ls -la coverage/lcov.info || true
          wc -l coverage/lcov.info || true

      - name: Upload frontend coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: frontend/fitmate-frontend/coverage/lcov.info
          flags: frontend
          disable_search: true
          verbose: true
          fail_ci_if_error: false
