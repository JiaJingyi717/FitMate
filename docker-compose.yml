version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: fitmate-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: fitmate
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/schema_mysql.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p123456"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    command: --default-authentication-plugin=mysql_native_password

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fitmate-app
    restart: always
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: mysql+pymysql://root:123456@db:3306/fitmate?charset=utf8mb4
      SECRET_KEY: fitmate-dev-secret
      JWT_SECRET_KEY: fitmate-jwt-secret
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend/fitmate-frontend
      dockerfile: Dockerfile
    container_name: fitmate-frontend
    restart: always
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/fitmate-frontend:/app
      - /app/node_modules

volumes:
  mysql_data:
